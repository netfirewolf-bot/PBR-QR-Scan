<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QR Сканер СМР</title>
    <!-- Подключаем библиотеку сканера -->
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        :root {
            --primary: #2196F3; --success: #4CAF50; --danger: #F44336;
            --bg: #F0F2F5; --card: #FFFFFF; --text: #333; --border: #E0E0E0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 12px; font-size: 14px; }
        
        .header { text-align: center; padding: 12px; background: var(--card); border-radius: 8px; border: 1px solid var(--border); margin-bottom: 12px; }
        .header h1 { font-size: 18px; margin-bottom: 8px; }
        .status-bar { display: flex; justify-content: space-around; background: #FAFAFA; padding: 8px; border-radius: 6px; font-size: 11px; }
        .status-item { text-align: center; cursor: pointer; padding: 4px; }
        .status-value { font-size: 16px; font-weight: bold; margin-bottom: 2px; }

        .card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 14px; margin-bottom: 12px; }
        .card-title { font-size: 15px; font-weight: 600; color: var(--primary); margin-bottom: 12px; border-bottom: 2px solid var(--primary); padding-bottom: 6px; }

        .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; font-size: 15px; font-weight: 600; cursor: pointer; margin-bottom: 8px; }
        .btn:active { opacity: 0.8; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
        .btn-row { display: flex; gap: 8px; }
        .btn-row .btn { margin-bottom: 0; }

        .scanner-container { background: #000; border-radius: 8px; overflow: hidden; margin-bottom: 12px; min-height: 250px; border: 2px solid var(--border); }
        #reader { width: 100%; }
        
        .input-group { display: flex; gap: 8px; margin-bottom: 12px; }
        .input-group input { flex: 1; padding: 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 16px; }

        .item-info { display: none; }
        .item-info.show { display: block; animation: fadeIn 0.3s; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
        .info-row { background: #FAFAFA; padding: 8px; border-radius: 6px; border: 1px solid var(--border); }
        .info-row.full { grid-column: 1 / -1; }
        .info-label { font-size: 11px; color: #666; text-transform: uppercase; margin-bottom: 4px; }
        .info-value { font-size: 15px; font-weight: 500; word-break: break-word; }
        .info-value.highlight { color: var(--success); font-weight: bold; font-size: 18px; }

        .edit-section { margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 13px; color: #666; }
        .form-group input, .form-group textarea { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 16px; background: #FAFAFA; }

        .debug-panel { 
            display: none; margin-top: 12px; padding: 10px; background: #1e1e1e; color: #00ff00; 
            font-family: monospace; font-size: 11px; border-radius: 6px; max-height: 200px; overflow-y: auto; 
        }
        .debug-panel.show { display: block; }

        .notification { 
            position: fixed; top: 12px; left: 50%; transform: translateX(-50%) translateY(-100px); 
            padding: 12px 20px; border-radius: 6px; color: white; font-weight: 600; z-index: 1000; 
            font-size: 14px; max-width: 90%; text-align: center; transition: transform 0.3s;
        }
        .notification.show { transform: translateX(-50%) translateY(0); }
        .notification.success { background: var(--success); }
        .notification.error { background: var(--danger); }
        .notification.info { background: var(--primary); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="header">
        <h1>QR Сканер СМР</h1>
        <div class="status-bar">
            <div class="status-item" onclick="toggleDebug()"><div class="status-value" id="connStatus">🔍</div><div>Сеть</div></div>
            <div class="status-item" onclick="toggleDebug()"><div class="status-value" id="dbStatus">❌</div><div>База</div></div>
            <div class="status-item" onclick="showPending()"><div class="status-value" id="pendingCount" style="color: var(--danger);">0</div><div>Ожидают</div></div>
        </div>
        <div class="debug-panel" id="debugPanel"></div>
    </div>

    <div class="card">
        <div class="card-title">🔄 Синхронизация</div>
        <div class="btn-row">
            <button class="btn btn-outline" id="btnDownload" onclick="app.downloadDB()">📥 Загрузить базу</button>
            <button class="btn btn-success" id="btnSync" onclick="app.syncNow()">📤 Отправить (0)</button>
        </div>
        <button class="btn btn-outline" onclick="app.testConnection()" style="margin-top:8px; font-size:12px; padding:8px;">🔍 Проверить связь с сервером</button>
    </div>

    <div class="scanner-container">
        <div id="reader"></div>
    </div>
    
    <div class="btn-row">
        <button class="btn btn-primary" onclick="app.startScanner()">▶️ Камера</button>
        <button class="btn btn-danger" onclick="app.stopScanner()">⏹️ Стоп</button>
    </div>

    <div class="input-group">
        <input type="text" id="manualCode" placeholder="Или введите артикул вручную...">
        <button class="btn btn-primary" style="width: auto; margin: 0;" onclick="app.searchManual()">🔍</button>
    </div>

    <div class="card item-info" id="itemInfo">
        <div class="card-title">ℹ️ Информация о позиции</div>
        <div class="info-grid">
            <div class="info-row"><div class="info-label">Бух. №</div><div class="info-value" id="infoBukh">-</div></div>
            <div class="info-row"><div class="info-label">Ед. изм.</div><div class="info-value" id="infoUnit">-</div></div>
            <div class="info-row full"><div class="info-label">Наименование</div><div class="info-value" id="infoName">-</div></div>
            <div class="info-row"><div class="info-label">Остаток (1С)</div><div class="info-value" id="infoBalance">-</div></div>
            <div class="info-row"><div class="info-label">Факт (SMR)</div><div class="info-value highlight" id="infoFact">-</div></div>
            <div class="info-row full"><div class="info-label">Разница</div><div class="info-value" id="infoDiff" style="color:var(--danger); font-weight:bold;">-</div></div>
        </div>

        <div class="edit-section">
            <div class="card-title" style="margin-top:0;">✏️ Редактирование</div>
            <div class="form-group">
                <label>Фактическое количество:</label>
                <input type="number" id="editFact" step="0.001" inputmode="decimal">
            </div>
            <div class="form-group">
                <label>Примечание:</label>
                <textarea id="editNote" rows="2"></textarea>
            </div>
            <button class="btn btn-success" onclick="app.saveData()">💾 Сохранить изменения</button>
        </div</div>

    <div class="notification" id="notification"></div>

    <script>
        // ==========================================
        // КОНФИГУРАЦИЯ
        // ==========================================
        const CONFIG = {
            // ВАЖНО: В Google Apps Script должно быть: "Выполнять от имени: Меня", "У кого есть доступ: Все"
            API_URL: 'https://script.google.com/macros/s/AKfycbyHNCpamy8sO3boVNhphMrzEJgnDs0GV0VkNpoLeU6Doroq1cLV4LYGtTMXPCi4KbXB/exec',
            DB_NAME: 'SMR_QR_DB_v2'
        };

        // ==========================================
        // ОСНОВНОЙ КЛАСС ПРИЛОЖЕНИЯ
        // ==========================================
        class ScannerApp {
            constructor() {
                this.db = null;
                this.currentItem = null;
                this.html5QrCode = null;
                this.isOnline = navigator.onLine;
                
                // Привязка событий
                window.addEventListener('online', () => this.updateNetworkStatus(true));
                window.addEventListener('offline', () => this.updateNetworkStatus(false));
                document.getElementById('manualCode').addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') { e.preventDefault(); this.searchManual(); }
                });
            }

            log(msg, type = 'info') {
                const panel = document.getElementById('debugPanel');
                const time = new Date().toLocaleTimeString();
                const color = type === 'error' ? '#ff4444' : (type === 'success' ? '#00ff00' : '#00ff00');
                panel.innerHTML += `<div style="color:${color}">[${time}] ${msg}</div>`;
                panel.scrollTop = panel.scrollHeight;
                console.log(`[${type.toUpperCase()}] ${msg}`);
            }

            notify(msg, type = 'info') {
                const el = document.getElementById('notification');
                el.textContent = msg;
                el.className = `notification show ${type}`;
                setTimeout(() => el.classList.remove('show'), 3000);
            }

            async init() {
                this.log("Запуск приложения...");
                this.updateNetworkStatus(this.isOnline);
                
                // Проверка протокола
                if (window.location.protocol === 'file:') {
                    this.log("⚠️ ОШИБКА: Файл открыт как file://. Камера и База данных НЕ БУДУТ работать!", "error");
                    this.notify("⚠️ Откройте через веб-сервер или GitHub Pages!", "error");
                    return;
                }

                try {
                    await this.initDB();
                    await this.updatePendingCount();
                    this.log("✅ Приложение успешно инициализировано", "success");
                } catch (e) {
                    this.log(`❌ Критическая ошибка инициализации: ${e.message}`, "error");
                    this.notify("❌ Ошибка запуска. Проверьте консоль/отладку.", "error");
                }
            }

            async initDB() {
                return new Promise((resolve, reject) => {
                    if (!window.indexedDB) {
                        reject(new Error("Ваш браузер не поддерживает IndexedDB"));
                        return;
                    }
                    this.log("Открытие базы данных...");
                    const request = indexedDB.open(CONFIG.DB_NAME, 1);
                    
                    request.onerror = (e) => {
                        this.log(`❌ Ошибка БД: ${e.target.error.name}`, "error");
                        reject(e.target.error);
                    };
                    
                    request.onsuccess = (e) => {
                        this.db = e.target.result;
                        this.log("✅ База данных открыта", "success");
                        this.updateDBStatus().then(resolve);
                    };
                    
                    request.onupgradeneeded = (e) => {
                        const db = e.target.result;
                        if (!db.objectStoreNames.contains('items')) {
                            db.createObjectStore('items', { keyPath: 'bukh' });
                        }
                        if (!db.objectStoreNames.contains('pending')) {
                            db.createObjectStore('pending', { keyPath: 'id', autoIncrement: true });
                        }
                    };
                });
            }

            async updateDBStatus() {
                if (!this.db) return;
                const tx = this.db.transaction(['items'], 'readonly');
                const store = tx.objectStore('items');
                const req = store.count();
                req.onsuccess = () => {
                    const count = req.result;
                    const el = document.getElementById('dbStatus');
                    if (count > 0) {
                        el.textContent = `✅ (${count})`;
                        el.style.color = 'var(--success)';
                    } else {
                        el.textContent = '❌ (0)';
                        el.style.color = 'var(--danger)';
                    }
                };
            }

            updateNetworkStatus(online) {
                this.isOnline = online;
                const el = document.getElementById('connStatus');
                if (online) {
                    el.textContent = '🟢';
                    el.style.color = 'var(--success)';
                    this.notify("🟢 Сеть подключена", "success");
                } else {
                    el.textContent = '🔴';
                    el.style.color = 'var(--danger)';
                    this.notify("🔴 Работа в оффлайн", "info");
                }
            }

            // --- СКАНЕР ---
            startScanner() {
                if (this.html5QrCode && this.html5QrCode.isScanning) return;
                
                this.log("Запуск камеры...");
                this.html5QrCode = new Html5Qrcode("reader");
                
                this.html5QrCode.start(
                    { facingMode: "environment" },
                    { fps: 10, qrbox: { width: 250, height: 250 } },
                    (decodedText) => this.onScanSuccess(decodedText),
                    (errorMessage) => { /* Игнорируем ошибки кадров */ }
                ).catch(err => {
                    this.log(`❌ Ошибка камеры: ${err}`, "error");
                    this.notify("❌ Нет доступа к камере. Проверьте HTTPS и разрешения.", "error");
                });
            }

            stopScanner() {
                if (this.html5QrCode && this.html5QrCode.isScanning) {
                    this.html5QrCode.stop().then(() => {
                        this.html5QrCode.clear();
                        this.log("Камера остановлена");
                    });
                }
            }

            async onScanSuccess(code) {
                if (navigator.vibrate) navigator.vibrate(100);
                this.stopScanner(); // Останавливаем после успешного скана
                document.getElementById('manualCode').value = code;
                await this.processScan(code);
            }

            async searchManual() {
                const code = document.getElementById('manualCode').value.trim();
                if (!code) { this.notify("⚠️ Введите артикул", "error"); return; }
                await this.processScan(code);
            }

            async processScan(code) {
                this.notify(`🔍 Поиск: ${code}`, "info");
                try {
                    const item = await this.findItem(code);
                    if (item) {
                        this.currentItem = item;
                        this.displayItem(item);
                        this.notify("✅ Найдено", "success");
                        setTimeout(() => document.getElementById('editFact').focus(), 300);
                    } else {
                        this.notify(`⚠️ Не найдено: ${code}`, "error");
                        document.getElementById('itemInfo').classList.remove('show');
                    }
                } catch (e) {
                    this.log(`Ошибка поиска: ${e.message}`, "error");
                }
            }

            findItem(code) {
                return new Promise((resolve) => {
                    const tx = this.db.transaction(['items'], 'readonly');
                    const store = tx.objectStore('items');
                    const req = store.getAll();
                    req.onsuccess = () => {
                        const cleanCode = String(code).trim().replace(/^0+/, '');
                        const found = req.result.find(item => {
                            const bukh = String(item.bukh || '').trim().replace(/^0+/, '');
                            return bukh === cleanCode || String(item.barcode || '').trim() === cleanCode;
                        });
                        resolve(found || null);
                    };
                    req.onerror = () => resolve(null);
                });
            }

            displayItem(item) {
                document.getElementById('infoBukh').textContent = item.bukh || '-';
                document.getElementById('infoName').textContent = item.name || '-';
                document.getElementById('infoUnit').textContent = item.unit || 'шт';
                document.getElementById('infoBalance').textContent = Number(item.balance || 0).toFixed(3);
                document.getElementById('infoFact').textContent = Number(item.fact || 0).toFixed(3);
                
                const diff = (item.balance || 0) - (item.fact || 0);
                document.getElementById('infoDiff').textContent = diff.toFixed(3);
                
                document.getElementById('editFact').value = item.fact || '';
                document.getElementById('editNote').value = item.note || '';
                
                document.getElementById('itemInfo').classList.add('show');
                document.getElementById('itemInfo').scrollIntoView({ behavior: 'smooth' });
            }

            async saveData() {
                if (!this.currentItem) { this.notify("⚠️ Сначала отсканируйте товар", "error"); return; }
                
                const fact = parseFloat(document.getElementById('editFact').value) || 0;
                const note = document.getElementById('editNote').value;
                
                const change = {
                    code: this.currentItem.bukh,
                    fact: fact,
                    note: note,
                    timestamp: new Date().toISOString(),
                    synced: false
                };

                try {
                    // 1. Сохраняем в очередь отправки
                    const tx1 = this.db.transaction(['pending'], 'readwrite');
                    tx1.objectStore('pending').add(change);
                    
                    // 2. Обновляем локальную базу для мгновенного отображения
                    const tx2 = this.db.transaction(['items'], 'readwrite');
                    const store = tx2.objectStore('items');
                    const updatedItem = { ...this.currentItem, fact: fact, note: note };
                    store.put(updatedItem);
                    this.currentItem = updatedItem;
                    
                    this.displayItem(this.currentItem);
                    await this.updatePendingCount();
                    this.notify("✅ Сохранено локально", "success");
                    
                    if (this.isOnline) {
                        setTimeout(() => this.syncNow(), 1000);
                    }
                } catch (e) {
                    this.log(`Ошибка сохранения: ${e.message}`, "error");
                    this.notify("❌ Ошибка сохранения", "error");
                }
            }

            // --- СИНХРОНИЗАЦИЯ ---
            async testConnection() {
                this.notify("Проверка связи...", "info");
                this.log("Тест соединения с: " + CONFIG.API_URL);
                try {
                    const response = await fetch(CONFIG.API_URL + '?action=ping', { method: 'GET', mode: 'cors' });
                    this.log(`Ответ сервера: ${response.status} ${response.statusText}`, "success");
                    this.notify("✅ Связь с сервером есть!", "success");
                } catch (err) {
                    this.log(`❌ Ошибка сети: ${err.message}. Возможно, CORS или скрипт не опубликован как "Все"`, "error");
                    this.notify("❌ Нет связи. Проверьте URL и настройки GAS.", "error");
                }
            }

            async downloadDB() {
                const btn = document.getElementById('btnDownload');
                btn.disabled = true; btn.textContent = '⏳ Загрузка...';
                this.notify('⏳ Загрузка базы...', 'info');
                
                try {
                    const response = await fetch(CONFIG.API_URL + '?action=getItems', { mode: 'cors' });
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    const data = await response.json();
                    
                    if (data.success && data.items) {
                        const tx = this.db.transaction(['items'], 'readwrite');
                        const store = tx.objectStore('items');
                        store.clear();
                        data.items.forEach(item => { if(item.bukh) store.put(item); });
                        
                        tx.oncomplete = async () => {
                            await this.updateDBStatus();
                            this.notify(`✅ Загружено ${data.items.length} позиций`, 'success');
                        };
                    } else {
                        throw new Error(data.error || 'Неверный формат ответа');
                    }
                } catch (err) {
                    this.log(`Ошибка загрузки: ${err.message}`, "error");
                    this.notify(`❌ Ошибка: ${err.message}`, "error");
                } finally {
                    btn.disabled = false; btn.textContent = '📥 Загрузить базу';
                }
            }

            async syncNow() {
                if (!this.isOnline) { this.notify("🔴 Нет сети", "error"); return; }
                
                const btn = document.getElementById('btnSync');
                btn.disabled = true; btn.textContent = '⏳ Отправка...';
                this.notify('⏳ Отправка...', 'info');
                
                try {
                    const tx = this.db.transaction(['pending'], 'readwrite');
                    const store = tx.objectStore('pending');
                    const req = store.getAll();
                    
                    req.onsuccess = async () => {
                        const changes = req.result.filter(c => !c.synced);
                        if (changes.length === 0) {
                            this.notify("✅ Нечего отправлять", "success");
                            btn.disabled = false; btn.textContent = '📤 Отправить (0)';
                            return;
                        }
                        
                        const response = await fetch(CONFIG.API_URL, {
                            method: 'POST',
                            mode: 'cors',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ action: 'batchUpdate', updates: changes })
                        });
                        
                        const result = await response.json();
                        if (result.success) {
                            // Помечаем как отправленные
                            const tx2 = this.db.transaction(['pending'], 'readwrite');
                            const store2 = tx2.objectStore('pending');
                            changes.forEach(c => store2.delete(c.id));
                            
                            tx2.oncomplete = () => {
                                this.updatePendingCount();
                                this.notify(`✅ Отправлено ${changes.length} изм.`, "success");
                            };
                        } else {
                            throw new Error(result.error || 'Ошибка сервера');
                        }
                    };
                } catch (err) {
                    this.log(`Ошибка синхронизации: ${err.message}`, "error");
                    this.notify(`❌ Ошибка отправки: ${err.message}`, "error");
                } finally {
                    btn.disabled = false;
                    this.updatePendingCount();
                }
            }

            async updatePendingCount() {
                const tx = this.db.transaction(['pending'], 'readonly');
                const store = tx.objectStore('pending');
                const req = store.getAll();
                req.onsuccess = () => {
                    const count = req.result.filter(c => !c.synced).length;
                    document.getElementById('pendingCount').textContent = count;
                    document.getElementById('btnSync').textContent = `📤 Отправить (${count})`;
                };
            }

            showPending() {
                this.notify("Функция просмотра очереди в разработке", "info");
            }
        }

        // ==========================================
        // ИНИЦИАЛИЗАЦИЯ
        // ==========================================
        const app = new ScannerApp();
        
        // Ждем полной загрузки DOM перед запуском
        document.addEventListener('DOMContentLoaded', () => {
            app.init();
        });

        function toggleDebug() {
            document.getElementById('debugPanel').classList.toggle('show');
        }
    </script>
</body>
</html>
